<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0E2D42" />
  <title>The OGs</title>
  <style>
    :root {
      --navy:   #0E2D42;
      --orange: #FF5420;
      --og:     #ff7a55;
      --bg:     #FEFCFF;
      --text:   #0E2D42;
      --muted:  #5a7a90;
      --r:      14px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; overflow-x: hidden; }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: var(--navy); border-bottom: 3px solid var(--orange);
      display: grid; grid-template-columns: 1fr auto 1fr;
      align-items: center; padding: 0 24px; height: 62px;
    }
    .nav-dots { display: flex; gap: 6px; align-items: center; }
    .nd { width: 9px; height: 9px; border-radius: 50%; background: var(--orange); }
    .nd:nth-child(2) { opacity: .5; background: #9eb5c5; }
    .nd:nth-child(3) { opacity: .25; background: #9eb5c5; }
    .brand { font-size: 1.5rem; font-weight: 900; letter-spacing: .04em; color: #FEFCFF; text-align: center; }
    .brand span { color: var(--orange); }
    .nav-right { display: flex; justify-content: flex-end; }
    .nav-tag { font-size: .72rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--orange); border: 1px solid rgba(255,84,32,.4); border-radius: 20px; padding: 4px 12px; }

    /* HERO */
    .hero {
      background: var(--navy); text-align: center; padding: 52px 24px 52px;
      position: relative; overflow: hidden;
    }
    .hero::after {
      content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 44px;
      background: var(--bg); clip-path: ellipse(55% 100% at 50% 100%);
    }
    .hero-eye { font-size: .72rem; letter-spacing: .22em; text-transform: uppercase; color: var(--orange); font-weight: 700; margin-bottom: 10px; }
    .hero h1 { font-size: clamp(2rem, 7vw, 3.6rem); font-weight: 900; line-height: 1.1; color: #FEFCFF; letter-spacing: -.02em; }
    .hero h1 em { color: var(--orange); font-style: normal; }
    .hero-sub { color: #9eb5c5; font-size: .95rem; margin-top: 12px; }

    /* COLLAGE WRAPPER */
    .collage-wrap { padding: 52px 20px 72px; max-width: 1140px; margin: 0 auto; }
    .collage-header { display: flex; align-items: center; gap: 16px; margin-bottom: 36px; }
    .collage-title { font-size: 1.25rem; font-weight: 900; }
    .collage-line { flex: 1; height: 1.5px; background: linear-gradient(90deg, var(--orange), transparent); }
    .collage-count { font-size: .72rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--orange); border: 1px solid var(--orange); border-radius: 20px; padding: 3px 10px; }

    /* BENTO GRID */
    .collage {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-auto-rows: 210px;
      gap: 14px;
    }

    /* CARD BASE */
    .og-card {
      position: relative; border-radius: var(--r); overflow: hidden;
      cursor: pointer; box-shadow: 0 2px 14px rgba(14,45,66,.1);
      opacity: 0; transform: translateY(30px) scale(.96);
      animation: fadeUp .6s ease forwards;
      transition: transform .35s cubic-bezier(.22,1,.36,1), box-shadow .35s;
      background: #ddeaf0;
    }
    .og-card:hover {
      transform: translateY(-5px) scale(1.02) rotate(0deg) !important;
      box-shadow: 0 18px 44px rgba(255,84,32,.22);
      z-index: 10;
    }
    .og-card img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      transition: transform .5s cubic-bezier(.22,1,.36,1), filter .3s;
      filter: saturate(.92) brightness(.97);
    }
    .og-card:hover img { transform: scale(1.08); filter: saturate(1.12) brightness(1.02); }

    /* SIZES */
    .big   { grid-column: span 2; grid-row: span 2; }
    .tall  { grid-row: span 2; }
    .wide  { grid-column: span 2; }
    .sq    { /* default 1×1 */ }

    /* TILTS */
    .tl  { animation-name: fadeUpTL; }
    .tr  { animation-name: fadeUpTR; }
    .tll { animation-name: fadeUpTLL; }
    .trr { animation-name: fadeUpTRR; }

    @keyframes fadeUp   { to { opacity:1; transform:translateY(0) scale(1);               } }
    @keyframes fadeUpTL { to { opacity:1; transform:translateY(0) scale(1) rotate(-1.2deg);} }
    @keyframes fadeUpTR { to { opacity:1; transform:translateY(0) scale(1) rotate(1.1deg); } }
    @keyframes fadeUpTLL{ to { opacity:1; transform:translateY(0) scale(1) rotate(-2deg);  } }
    @keyframes fadeUpTRR{ to { opacity:1; transform:translateY(0) scale(1) rotate(1.8deg); } }

    /* STAGGER */
    .og-card:nth-child(1)  { animation-delay:.04s }
    .og-card:nth-child(2)  { animation-delay:.08s }
    .og-card:nth-child(3)  { animation-delay:.12s }
    .og-card:nth-child(4)  { animation-delay:.16s }
    .og-card:nth-child(5)  { animation-delay:.20s }
    .og-card:nth-child(6)  { animation-delay:.24s }
    .og-card:nth-child(7)  { animation-delay:.28s }
    .og-card:nth-child(8)  { animation-delay:.32s }
    .og-card:nth-child(9)  { animation-delay:.36s }
    .og-card:nth-child(10) { animation-delay:.40s }
    .og-card:nth-child(11) { animation-delay:.44s }
    .og-card:nth-child(12) { animation-delay:.48s }
    .og-card:nth-child(13) { animation-delay:.52s }
    .og-card:nth-child(14) { animation-delay:.56s }
    .og-card:nth-child(15) { animation-delay:.60s }

    /* OVERLAY */
    .og-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(14,45,66,.88) 0%, rgba(14,45,66,.15) 55%, transparent 100%);
      opacity: 0; transition: opacity .3s;
      display: flex; flex-direction: column; justify-content: flex-end; padding: 16px;
    }
    .og-card:hover .og-overlay { opacity: 1; }
    .og-name    { font-size: .9rem; font-weight: 800; color: #fff; letter-spacing: .02em; }
    .og-caption { font-size: .74rem; color: rgba(255,255,255,.72); margin-top: 4px; line-height: 1.4; }

    /* CORNER ACCENT */
    .og-card::before {
      content: ''; position: absolute; top: 0; left: 0; z-index: 3;
      width: 0; height: 0; border-style: solid; border-width: 0;
      border-color: var(--orange) transparent transparent transparent;
      transition: border-width .25s;
    }
    .og-card:hover::before { border-width: 30px 30px 0 0; }

    /* STICKY NOTE style caption tag */
    .og-tag {
      position: absolute; bottom: 10px; left: 10px;
      background: rgba(255,252,255,.92); color: var(--navy);
      font-size: .68rem; font-weight: 700; letter-spacing: .04em;
      padding: 4px 9px; border-radius: 20px;
      border-left: 3px solid var(--orange);
      opacity: 0; transform: translateY(6px);
      transition: opacity .3s, transform .3s;
      max-width: calc(100% - 20px);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .og-card:hover .og-tag { opacity: 1; transform: translateY(0); }

    /* LIGHTBOX */
    .lb {
      display: none; position: fixed; inset: 0; z-index: 400;
      background: rgba(9,20,34,.96); backdrop-filter: blur(12px);
      align-items: center; justify-content: center;
      flex-direction: column; gap: 16px; padding: 24px;
    }
    .lb.open { display: flex; }
    .lb-wrap {
      position: relative; max-width: min(540px, 90vw);
      animation: lbIn .38s cubic-bezier(.22,1,.36,1);
    }
    @keyframes lbIn { from { opacity:0; transform:scale(.88) translateY(24px); } to { opacity:1; transform:none; } }
    .lb-wrap img { width: 100%; max-height: 74dvh; object-fit: contain; border-radius: 18px; box-shadow: 0 32px 80px rgba(0,0,0,.65); display: block; }
    .lb-info { margin-top: 14px; text-align: center; }
    .lb-name { font-size: 1.05rem; font-weight: 800; color: #fff; }
    .lb-cap  { font-size: .82rem; color: rgba(255,255,255,.6); margin-top: 5px; line-height: 1.5; max-width: 400px; margin-left: auto; margin-right: auto; }
    .lb-close { position: absolute; top: 18px; right: 22px; background: none; border: none; cursor: pointer; color: rgba(255,255,255,.45); font-size: 1.8rem; line-height: 1; transition: color .15s; }
    .lb-close:hover { color: var(--orange); }
    .lb-nav { display: flex; gap: 12px; margin-top: 6px; }
    .lb-btn { background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.18); color: #fff; padding: 9px 22px; border-radius: 50px; font-size: .82rem; font-weight: 700; cursor: pointer; transition: background .15s, border-color .15s; }
    .lb-btn:hover { background: var(--orange); border-color: var(--orange); }
    .lb-counter { font-size: .75rem; color: rgba(255,255,255,.4); align-self: center; min-width: 50px; text-align: center; }

    /* FOOTER */
    footer { text-align: center; padding: 28px 20px; font-size: .78rem; color: var(--muted); border-top: 1.5px solid #ddeaf0; }
    footer b { color: var(--orange); font-weight: 800; }

    /* RESPONSIVE */
    @media (max-width: 720px) {
      .collage { grid-template-columns: repeat(2, 1fr); grid-auto-rows: 170px; gap: 10px; }
      .nav-tag { display: none; }
      .brand   { font-size: 1.25rem; }
    }
    @media (max-width: 420px) {
      .collage { grid-auto-rows: 140px; gap: 8px; }
    }
    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      footer { padding-bottom: calc(28px + env(safe-area-inset-bottom)); }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-dots"><div class="nd"></div><div class="nd"></div><div class="nd"></div></div>
  <div class="brand">The <span>OGs</span></div>
  <div class="nav-right"><div class="nav-tag">Est. Always</div></div>
</nav>

<section class="hero">
  <p class="hero-eye">📸 The Crew</p>
  <h1>Forever <em>The OGs</em></h1>
  <p class="hero-sub">Real ones. Real moments. Always.</p>
</section>

<section class="collage-wrap">
  <div class="collage-header">
    <h2 class="collage-title">Our Portraits</h2>
    <div class="collage-line"></div>
    <div class="collage-count" id="countBadge"></div>
  </div>
  <div class="collage" id="collage"></div>
</section>

<div class="lb" id="lb" role="dialog" aria-modal="true">
  <button class="lb-close" id="lbClose" aria-label="Close">✕</button>
  <div class="lb-wrap">
    <img id="lbImg" src="" alt="" />
  </div>
  <div class="lb-info">
    <div class="lb-name" id="lbName"></div>
    <div class="lb-cap"  id="lbCap"></div>
  </div>
  <div class="lb-nav">
    <button class="lb-btn" id="lbPrev">← Prev</button>
    <div class="lb-counter" id="lbCounter"></div>
    <button class="lb-btn" id="lbNext">Next →</button>
  </div>
</div>

<footer>Made with ❤️ by <b>The OGs</b> · Always and forever</footer>

<script>
// ── PHOTOS ─────────────────────────────────────────────────────
// size: 'big' (2×2) | 'tall' (1×2) | 'wide' (2×1) | 'sq' (1×1)
// tilt: '' | 'tl' | 'tr' | 'tll' | 'trr'
const photos = [
  {
    id: '1Il272BOQ4yhDdJWmbq7k6uZGUUeudW0s',
    name: 'The Whole Squad',
    caption: 'Every legend in one frame. This is us.',
    size: 'big', tilt: ''
  },
  {
    id: '1mwAoffEuF8P_ETcI4_Gy5pUfA74vbAEZ',
    name: 'Day Ones',
    caption: 'Been here since the beginning.',
    size: 'tall', tilt: 'tr'
  },
  {
    id: '11cXjHsmT99MbijvmKeGi00kcVJQR1qPc',
    name: 'Golden Hour',
    caption: 'We stay golden, no matter what.',
    size: 'sq', tilt: 'tl'
  },
  {
    id: '1nGxhtdFNlRTEbFGpd6_tisjfkDVOgdhm',
    name: 'Pure Vibes',
    caption: 'No cap, just good energy.',
    size: 'sq', tilt: 'trr'
  },
  {
    id: '1yiX3SZVa-0RICwBpxqWD3E76Hxy8aZyY',
    name: 'The Moment',
    caption: 'Right place, right people, always.',
    size: 'wide', tilt: 'tl'
  },
  {
    id: '1tH2uzmYtWScI1f3OEEH-9v9wtIe7ci5F',
    name: 'Built Different',
    caption: 'Can\'t find this energy anywhere else.',
    size: 'sq', tilt: 'tr'
  },
  {
    id: '1u8r0Si7gciGZnOKiIgOFZSsEZsFKva4f',
    name: 'Legendary',
    caption: 'History in the making.',
    size: 'tall', tilt: 'tll'
  },
  {
    id: '1tKrQ6BeGUbs7aoOFX-9QS671Lz3fjgxi',
    name: 'OG Energy',
    caption: 'This is what it looks like.',
    size: 'sq', tilt: 'tl'
  },
  {
    id: '1LL51btAXM--9KLWUtLjYmxXZQFZ2zK7b',
    name: 'Real Ones',
    caption: 'Rare breed, rare bond.',
    size: 'wide', tilt: ''
  },
  {
    id: '1fwzVtsENa0KKhZkpy6JM7G40IXx9Rt7Y',
    name: 'Always',
    caption: 'Through everything. Always.',
    size: 'sq', tilt: 'trr'
  },
  {
    id: '1vADvwLwz5joE5ZR0SogmjVto2AknVHFT',
    name: 'Timeless',
    caption: 'Some things never change.',
    size: 'big', tilt: ''
  },
  {
    id: '18XrKzr7mAPZlK44Znx7Do_1W0u_3aNfR',
    name: 'The Chapter',
    caption: 'A page we\'ll read forever.',
    size: 'tall', tilt: 'tr'
  },
  {
    id: '1ih5XTjdo5Q-glakqwJBQZbgd41KcaUaw',
    name: 'No Filter',
    caption: 'Just as we are.',
    size: 'sq', tilt: 'tll'
  },
  {
    id: '1vjpM9nKPI9CraOSp4103qbcUBr_zomNY',
    name: 'The Archives',
    caption: 'Keeping every memory alive.',
    size: 'wide', tilt: 'tl'
  },
  {
    id: '1z-vXK8Sr3DfvWgSJ50kRtM5BNz_voWA8',
    name: 'Forever OGs',
    caption: 'This is the one. This is us.',
    size: 'sq', tilt: 'tr'
  }
];

// ── BUILD GRID ─────────────────────────────────────────────────
const collage  = document.getElementById('collage');
const countBadge = document.getElementById('countBadge');
countBadge.textContent = photos.length + ' memories';

photos.forEach((p, i) => {
  const url  = `https://lh3.googleusercontent.com/d/${p.id}`;
  const card = document.createElement('div');
  card.className = ['og-card', p.size, p.tilt].filter(Boolean).join(' ');
  card.dataset.index = i;
  card.innerHTML = `
    <img src="${url}" alt="${p.name}" loading="lazy" />
    <div class="og-overlay">
      <div class="og-name">${p.name}</div>
      <div class="og-caption">${p.caption}</div>
    </div>
    <div class="og-tag">${p.caption}</div>
  `;
  card.addEventListener('click', () => openLb(i));
  collage.appendChild(card);
});

// ── LIGHTBOX ───────────────────────────────────────────────────
let cur = 0;
const lb      = document.getElementById('lb');
const lbImg   = document.getElementById('lbImg');
const lbName  = document.getElementById('lbName');
const lbCap   = document.getElementById('lbCap');
const lbClose = document.getElementById('lbClose');
const lbPrev  = document.getElementById('lbPrev');
const lbNext  = document.getElementById('lbNext');
const lbCounter = document.getElementById('lbCounter');

function showPhoto(idx) {
  cur = (idx + photos.length) % photos.length;
  const p = photos[cur];
  lbImg.style.opacity = '0';
  lbImg.style.transform = 'scale(.96)';
  lbImg.src = `https://lh3.googleusercontent.com/d/${p.id}`;
  lbImg.alt = p.name;
  lbName.textContent = p.name;
  lbCap.textContent  = p.caption;
  lbCounter.textContent = `${cur + 1} / ${photos.length}`;
  requestAnimationFrame(() => {
    lbImg.style.transition = 'opacity .3s, transform .3s';
    lbImg.style.opacity = '1';
    lbImg.style.transform = 'scale(1)';
  });
}

function openLb(idx) {
  showPhoto(idx);
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLb() {
  lb.classList.remove('open');
  document.body.style.overflow = '';
}

lbClose.addEventListener('click', closeLb);
lbPrev.addEventListener('click',  () => showPhoto(cur - 1));
lbNext.addEventListener('click',  () => showPhoto(cur + 1));
lb.addEventListener('click', e => { if (e.target === lb) closeLb(); });
document.addEventListener('keydown', e => {
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape')     closeLb();
  if (e.key === 'ArrowLeft')  showPhoto(cur - 1);
  if (e.key === 'ArrowRight') showPhoto(cur + 1);
});

// Swipe
let tx = 0;
lb.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
lb.addEventListener('touchend',   e => {
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 50) dx < 0 ? showPhoto(cur + 1) : showPhoto(cur - 1);
});
</script>
</body>
</html>
